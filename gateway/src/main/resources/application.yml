server:
  port: ${PORT:8080}

spring:
  application:
    name: gateway
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: auth-service
              uri: ${AUTH_SERVICE_URI:http://localhost:8081}
              predicates:
                - Path=/auth/**
            - id: queue-service
              uri: ${QUEUE_SERVICE_URI:http://localhost:8082}
              predicates:
                - Path=/queue/**
            - id: booking-service
              uri: ${BOOKING_SERVICE_URI:http://localhost:8083}
              predicates:
                - Path=/booking/**
          httpclient:
            connect-timeout: 2000
            response-timeout: 5s
          default-filters:
            - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      show-details: when_authorized

logging:
  level:
    org.springframework.cloud.gateway: INFO
    reactor.netty: INFO
