spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:auth_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false

server:
  port: ${PORT:8081}

jwt:
  secret: ${JWT_SECRET:auth-service-secret-key-must-be-at-least-32-characters-long}
  access-expiration-ms: ${JWT_ACCESS_EXPIRATION_MS:300000}
  refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:900000}

redis:
  host: ${REDIS_HOST:localhost}
  port: ${REDIS_PORT:6379}
  connect-timeout-ms: ${REDIS_CONNECT_TIMEOUT_MS:1000}
  read-timeout-ms: ${REDIS_READ_TIMEOUT_MS:1000}
  pool-size: ${REDIS_POOL_SIZE:4}
